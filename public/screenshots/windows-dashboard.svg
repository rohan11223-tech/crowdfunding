  <text x="340" y="910" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Raised</text>

  <rect x="522" y="838" width="230" height="132" rx="22" fill="#111c2f" stroke="#ffffff" stroke-opacity="0.05"/>
  <text x="637" y="878" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle">25,000</text>
  <text x="637" y="910" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Goal</text>

  <rect x="770" y="838" width="230" height="132" rx="22" fill="#111c2f" stroke="#ffffff" stroke-opacity="0.05"/>
  <text x="885" y="878" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle">2%</text>
  <text x="885" y="910" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Funded</text>

  <rect x="1018" y="838" width="230" height="132" rx="22" fill="#111c2f" stroke="#ffffff" stroke-opacity="0.05"/>
  <text x="1133" y="878" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle">PENDING</text>
  <text x="1133" y="910" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Live sync</text>

  <rect x="274" y="992" width="974" height="14" rx="7" fill="#1f2937" transform="translate(0 -22)"/>
  <rect x="274" y="992" width="38" height="14" rx="7" fill="url(#button)" transform="translate(0 -22)"/>

  <rect x="920" y="270" width="410" height="590" rx="28" fill="#1f2937" fill-opacity="0.92" stroke="#ffffff" stroke-opacity="0.06"/>
  <rect x="944" y="300" width="76" height="46" rx="23" fill="#0f766e" fill-opacity="0.5"/>
  <text x="982" y="330" fill="#67e8f9" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">IDLE</text>
  <text x="1125" y="388" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" text-anchor="middle">Wallet, contract, and state</text>
  <text x="1125" y="444" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle">Connect a Stellar wallet to donate and track</text>
  <text x="1125" y="476" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="22" text-anchor="middle">the campaign.</text>
  <rect x="956" y="528" width="338" height="50" rx="25" fill="url(#button)"/>
  <text x="1125" y="560" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" text-anchor="middle">Connect wallet</text>

  <text x="1125" y="637" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Donation amount (XLM)</text>
  <rect x="956" y="656" width="338" height="46" rx="14" fill="#374151" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="972" y="686" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18">150</text>
  <rect x="956" y="722" width="338" height="50" rx="25" fill="url(#button)"/>
  <text x="1125" y="754" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" text-anchor="middle">Call contract</text>

  <rect x="956" y="792" width="338" height="124" rx="18" fill="#374151" stroke="#ffffff" stroke-opacity="0.05"/>
  <text x="1125" y="828" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Contract address</text>
  <rect x="974" y="844" width="302" height="54" rx="6" fill="#26252f"/>
  <text x="1125" y="873" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16" text-anchor="middle">CB6Z2H3NUTBIYY7CUR5PKCF4YROK7SYHVP72GM54FZKJQMQZQZINPXTE</text>
