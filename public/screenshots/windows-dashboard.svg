<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Windows Dashboard</title>
  <desc id="desc">A stylized desktop browser screenshot of the Stellar Crowdfunding dashboard on Windows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="52%" stop-color="#101d36"/>
      <stop offset="100%" stop-color="#1d2f57"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111f39"/>
      <stop offset="100%" stop-color="#0b1322"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="180" cy="120" r="260" fill="#22d3ee" opacity="0.10"/>
  <circle cx="1430" cy="120" r="300" fill="#8b5cf6" opacity="0.12"/>
  <circle cx="1330" cy="880" r="310" fill="#22d3ee" opacity="0.08"/>

  <text x="80" y="92" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">Windows Dashboard</text>
  <text x="80" y="132" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="18">Desktop capture of the public Stellar Crowdfunding dashboard on Windows</text>

  <rect x="92" y="176" width="1416" height="756" rx="30" fill="#0f172a" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="92" y="176" width="1416" height="62" rx="30" fill="#111827"/>
  <circle cx="132" cy="207" r="8" fill="#fb7185"/>
  <circle cx="156" cy="207" r="8" fill="#fbbf24"/>
  <circle cx="180" cy="207" r="8" fill="#4ade80"/>
  <rect x="240" y="195" width="710" height="24" rx="12" fill="#0b1220" stroke="#ffffff" stroke-opacity="0.10"/>
  <rect x="240" y="195" width="250" height="24" rx="12" fill="#22d3ee" fill-opacity="0.22"/>
  <text x="258" y="213" fill="#cbd5e1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14">crowdfunding-mu-peach.vercel.app</text>
  <rect x="1222" y="191" width="42" height="30" rx="15" fill="#0b1220" fill-opacity="0.6"/>
  <rect x="1272" y="191" width="42" height="30" rx="15" fill="#0b1220" fill-opacity="0.6"/>
  <rect x="1322" y="191" width="42" height="30" rx="15" fill="#0b1220" fill-opacity="0.6"/>

  <rect x="142" y="270" width="1240" height="590" rx="36" fill="url(#hero)" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="372" y="360" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="18" letter-spacing="6">LEVEL 2 · STELLAR CROWDFUNDING</text>
  <text x="340" y="440" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="800">Support the next</text>
  <text x="310" y="520" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="800">wave of public goods.</text>
  <text x="287" y="580" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="24">Use multiple wallet options, send a contract call, and review the</text>
  <text x="310" y="618" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="24">funding state from the testnet contract.</text>

  <rect x="274" y="682" width="228" height="108" rx="22" fill="#111c2f" stroke="#22d3ee" stroke-opacity="0.45"/>
  <text x="299" y="718" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Freighter</text>
  <text x="299" y="748" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Browser extension</text>
  <text x="299" y="774" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">wallet</text>

