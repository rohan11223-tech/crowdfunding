  <text x="553" y="774" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="18">support</text>

  <rect x="274" y="838" width="230" height="132" rx="22" fill="#111c2f" stroke="#ffffff" stroke-opacity="0.05"/>
