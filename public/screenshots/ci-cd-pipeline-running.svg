<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">CI/CD Pipeline Running</title>
  <desc id="desc">A stylized screenshot of the repository's GitHub Actions CI pipeline running successfully.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#13284a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101d36"/>
      <stop offset="100%" stop-color="#0b1322"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <text x="80" y="92" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">CI / CD Pipeline Running</text>
  <text x="80" y="132" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="18">GitHub Actions workflow captured after a successful push to main</text>

  <rect x="84" y="140" width="1432" height="780" rx="16" fill="#0f172a" stroke="#ffffff" stroke-opacity="0.10"/>
  <rect x="84" y="140" width="1432" height="58" rx="16" fill="#111827"/>
  <text x="120" y="176" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">All checks have passed</text>
  <text x="120" y="198" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13">2 successful checks</text>
  <text x="1460" y="179" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="28" text-anchor="end">×</text>

  <rect x="84" y="198" width="1432" height="722" rx="16" fill="#111827" fill-opacity="0.25"/>

  <rect x="108" y="260" width="1384" height="88" rx="10" fill="#111827" fill-opacity="0.65" stroke="#ffffff" stroke-opacity="0.06"/>
  <text x="130" y="314" fill="#4ade80" font-family="Inter, Arial, sans-serif" font-size="30">✓</text>
  <rect x="176" y="282" width="28" height="28" rx="6" fill="#0b1220" stroke="#ffffff" stroke-opacity="0.10"/>
  <text x="220" y="306" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Vercel</text>
  <text x="316" y="306" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">- Deployment has completed</text>
  <text x="1430" y="306" fill="#60a5fa" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="end">Details</text>

  <rect x="108" y="364" width="1384" height="88" rx="10" fill="#111827" fill-opacity="0.65" stroke="#ffffff" stroke-opacity="0.06"/>
  <text x="130" y="418" fill="#4ade80" font-family="Inter, Arial, sans-serif" font-size="30">✓</text>
  <rect x="176" y="386" width="28" height="28" rx="6" fill="#0b1220" stroke="#ffffff" stroke-opacity="0.10"/>
  <text x="220" y="410" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">CI Pipeline / build-and-test (push)</text>
  <text x="660" y="410" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Successful in 1m</text>
  <text x="1430" y="410" fill="#60a5fa" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="end">Details</text>

  <text x="80" y="926" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="18">This mirrors the GitHub checks popup shown after deployment and CI finish successfully.</text>
</svg>
