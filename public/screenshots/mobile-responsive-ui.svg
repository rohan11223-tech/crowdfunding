<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Mobile Responsive UI</title>
  <desc id="desc">A stylized screenshot of the crowdfunding app in a narrow mobile layout.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#101d36"/>
      <stop offset="100%" stop-color="#13284a"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111f39" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#0b1322" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="170" cy="110" r="220" fill="#22d3ee" opacity="0.10"/>
  <circle cx="1470" cy="120" r="260" fill="#8b5cf6" opacity="0.10"/>
  <circle cx="1360" cy="860" r="290" fill="#22d3ee" opacity="0.07"/>

  <text x="80" y="92" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">Mobile Responsive UI</text>
  <text x="80" y="132" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="18">Captured at 390px width to verify mobile layout, spacing, and action flow</text>

  <rect x="505" y="72" rx="44" ry="44" width="590" height="856" fill="#0b1220" stroke="#dbeafe" stroke-opacity="0.14" stroke-width="4"/>
  <rect x="535" y="118" rx="28" ry="28" width="530" height="760" fill="url(#hero)" stroke="#ffffff" stroke-opacity="0.10"/>
  <rect x="535" y="118" rx="28" ry="28" width="530" height="56" fill="#0a1323" opacity="0.92"/>
  <circle cx="568" cy="146" r="7" fill="#fb7185"/>
  <circle cx="592" cy="146" r="7" fill="#fbbf24"/>
  <circle cx="616" cy="146" r="7" fill="#4ade80"/>
  <rect x="670" y="136" rx="14" ry="14" width="230" height="20" fill="#ffffff" fill-opacity="0.10"/>
  <rect x="670" y="136" rx="14" ry="14" width="84" height="20" fill="#22d3ee" fill-opacity="0.45"/>

  <rect x="566" y="200" rx="18" ry="18" width="146" height="34" fill="#0f2740" stroke="#67e8f9" stroke-opacity="0.32"/>
  <text x="586" y="223" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="13" letter-spacing="2">LEVEL 2</text>

  <text x="566" y="286" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Support the next</text>
  <text x="566" y="324" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">wave of public goods.</text>
  <text x="566" y="364" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="17">Wallet flow, contract calls,</text>
  <text x="566" y="388" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="17">and live state tracking.</text>

  <rect x="566" y="420" rx="16" ry="16" width="438" height="96" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="586" y="449" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="12" letter-spacing="1.2">RAISED</text>
  <text x="586" y="486" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">12,840 XLM</text>
  <text x="836" y="486" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13">51% funded</text>

  <rect x="566" y="534" rx="16" ry="16" width="438" height="96" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="586" y="563" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="12" letter-spacing="1.2">GOAL</text>
  <text x="586" y="600" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">25,000 XLM</text>
  <text x="836" y="600" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13">main campaign</text>

  <rect x="566" y="650" rx="999" ry="999" width="438" height="12" fill="#ffffff" fill-opacity="0.10"/>
  <rect x="566" y="650" rx="999" ry="999" width="223" height="12" fill="url(#button)"/>
  <text x="566" y="686" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13">Live sync updates contract state automatically</text>

  <rect x="566" y="710" rx="16" ry="16" width="438" height="58" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.10"/>
  <text x="586" y="745" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Connect wallet</text>
  <text x="888" y="745" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13">Freighter / LOBSTR</text>

  <rect x="566" y="782" rx="16" ry="16" width="438" height="58" fill="url(#button)"/>
  <text x="728" y="818" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Call contract</text>

  <text x="80" y="916" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="18">The layout stays readable on a narrow phone-sized viewport without collapsing the donation controls.</text>
</svg>
