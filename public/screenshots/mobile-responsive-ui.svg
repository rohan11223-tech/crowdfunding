<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Mobile Responsive UI</title>
  <desc id="desc">A stylized screenshot of the crowdfunding app in a narrow mobile layout.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#101d36"/>
      <stop offset="100%" stop-color="#13284a"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111f39" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#0b1322" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="170" cy="110" r="220" fill="#22d3ee" opacity="0.10"/>
  <circle cx="1470" cy="120" r="260" fill="#8b5cf6" opacity="0.10"/>
  <circle cx="1360" cy="860" r="290" fill="#22d3ee" opacity="0.07"/>

  <text x="80" y="92" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">Mobile Responsive UI</text>
  <text x="80" y="132" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="18">Captured at 390px width to verify mobile layout, spacing, and action flow</text>

  <rect x="505" y="72" rx="44" ry="44" width="590" height="856" fill="#0b1220" stroke="#dbeafe" stroke-opacity="0.14" stroke-width="4"/>
  <rect x="535" y="118" rx="28" ry="28" width="530" height="760" fill="url(#hero)" stroke="#ffffff" stroke-opacity="0.10"/>
  <rect x="535" y="118" rx="28" ry="28" width="530" height="56" fill="#0a1323" opacity="0.92"/>
  <circle cx="568" cy="146" r="7" fill="#fb7185"/>
  <circle cx="592" cy="146" r="7" fill="#fbbf24"/>
  <circle cx="616" cy="146" r="7" fill="#4ade80"/>
  <rect x="670" y="136" rx="14" ry="14" width="230" height="20" fill="#ffffff" fill-opacity="0.10"/>
  <rect x="670" y="136" rx="14" ry="14" width="84" height="20" fill="#22d3ee" fill-opacity="0.45"/>

  <rect x="566" y="196" rx="18" ry="18" width="186" height="38" fill="#0f2740" stroke="#67e8f9" stroke-opacity="0.32"/>
  <text x="619" y="220" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="12" letter-spacing="2">LEVEL 2 · STELLAR</text>
  <text x="585" y="238" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="12" letter-spacing="2">CROWDFUNDING</text>

  <text x="566" y="294" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">Support the next</text>
  <text x="566" y="332" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">wave of public</text>
  <text x="566" y="370" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">goods.</text>
  <text x="566" y="414" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">Use multiple wallet options, send a real</text>
  <text x="566" y="438" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">contract call, and watch the funding state</text>
  <text x="566" y="462" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">stay in sync with the testnet contract.</text>

  <rect x="566" y="494" rx="16" ry="16" width="438" height="72" fill="#1a2337" fill-opacity="0.98" stroke="#ffffff" stroke-opacity="0.06"/>
  <text x="742" y="522" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" text-anchor="middle">12,840 XLM</text>
  <text x="742" y="542" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Raised</text>

  <rect x="566" y="576" rx="16" ry="16" width="438" height="72" fill="#1a2337" fill-opacity="0.98" stroke="#ffffff" stroke-opacity="0.06"/>
  <text x="742" y="604" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" text-anchor="middle">25,000 XLM</text>
  <text x="742" y="624" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Goal</text>

  <rect x="566" y="662" rx="999" ry="999" width="438" height="10" fill="#1f2937"/>
  <rect x="566" y="662" rx="999" ry="999" width="235" height="10" fill="url(#button)"/>

  <rect x="566" y="686" rx="16" ry="16" width="438" height="54" fill="#0f172a" fill-opacity="0.86" stroke="#22d3ee" stroke-opacity="0.18"/>
  <text x="586" y="713" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Freighter</text>
  <text x="586" y="732" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="12">Browser extension wallet</text>

  <rect x="566" y="754" rx="16" ry="16" width="438" height="54" fill="#0f172a" fill-opacity="0.75" stroke="#ffffff" stroke-opacity="0.05"/>
  <text x="586" y="781" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">LOBSTR</text>
  <text x="586" y="800" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="12">Mobile-first wallet support</text>

  <rect x="566" y="822" rx="6" ry="6" width="438" height="8" fill="#1f2937"/>
  <rect x="566" y="822" rx="6" ry="6" width="126" height="8" fill="#38bdf8"/>
  <rect x="694" y="822" rx="6" ry="6" width="88" height="8" fill="#a855f7"/>
  <rect x="784" y="822" rx="6" ry="6" width="220" height="8" fill="#1f2937"/>

  <rect x="566" y="852" rx="18" ry="18" width="438" height="0" fill="none"/>
  <text x="80" y="916" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="18">The layout stays readable on a narrow phone-sized viewport without collapsing the donation controls.</text>
</svg>
